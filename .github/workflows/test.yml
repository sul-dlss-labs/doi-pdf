name: test

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: test-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install Python (pinned in .python-version)
        run: uv python install

      - name: Create the virtualenv and install
        run: |
          uv venv
          uv pip install -e '.[dev]'

      - name: Lint
        run: uv run ruff check

      - name: Format
        run: uv run ruff format --check

      - name: Type check
        run: uv run ty check

      # The network/browser tests hit live services and drive a headless
      # browser, so they are too flaky for a PR gate; run the deterministic
      # subset here. Run the full suite locally with `uv run pytest`.
      - name: Run tests
        run: uv run pytest -m "not network and not browser"
